# ============================================================
# hyprlock.conf — Lock screen configuration for hyprlock.
# Uses GitHub Primer color tokens to match the eww bar style.
# Reference: https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/
# ============================================================

general {
    # Disable the default grace period before locking takes effect.
    grace = 0

    # Hide the cursor on the lock screen.
    hide_cursor = true
}

background {
    monitor =

    # Use the same wallpaper as swww.
    # Falls back to a solid Primer canvas color if the path is invalid.
    path = $HOME/wallpapers/default.gif

    # Apply blur to the wallpaper on the lock screen.
    blur_passes  = 3
    blur_size    = 6
    brightness   = 0.6
    contrast     = 1.0
    vibrancy     = 0.2
    vibrancy_darkness = 0.0
}

input-field {
    monitor =

    size     = 280, 48
    outline_thickness = 2

    # Primer color tokens for the input field.
    outer_color  = rgb(30363d)
    inner_color  = rgb(161b22)
    font_color   = rgb(e6edf3)
    check_color  = rgb(388bfd)
    fail_color   = rgb(f85149)

    placeholder_text = <span foreground="##8b949e">Password</span>
    fail_text        = <span foreground="##f85149">$FAIL <b>($ATTEMPTS)</b></span>

    # Hide the input text with dots.
    dots_size    = 0.26
    dots_spacing = 0.64
    dots_center  = true

    position  = 0, -100
    halign    = center
    valign    = center
}

label {
    monitor =

    # Display the current time in large text.
    text     = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    font_size   = 72
    font_family = JetBrains Mono

    color    = rgb(e6edf3)
    position = 0, 80
    halign   = center
    valign   = center
}

label {
    monitor =

    # Display the current date below the time.
    text     = cmd[update:60000] echo "$(date +"%A, %B %d")"
    font_size   = 18
    font_family = JetBrains Mono

    color    = rgb(8b949e)
    position = 0, -10
    halign   = center
    valign   = center
}

label {
    monitor =

    # Display the current username above the input field.
    text        = $USER
    font_size   = 14
    font_family = JetBrains Mono

    color    = rgb(8b949e)
    position = 0, -60
    halign   = center
    valign   = center
}
