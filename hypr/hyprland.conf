# ============================================================
# hyprland.conf — Main Hyprland configuration.
# Part of the dotfiles managed via ~/dotfiles/install.sh.
# Reference: https://wiki.hypr.land/Configuring/
# ============================================================


################
### MONITORS ###
################

# Default monitor configuration. Uses preferred resolution and auto position.
# Additional monitors are appended dynamically by start-eww.sh.
# Reference: https://wiki.hypr.land/Configuring/Monitors/
monitor = , preferred, auto, 1


###################
### MY PROGRAMS ###
###################

# Primary applications used throughout keybindings.
$terminal    = wezterm
$fileManager = dolphin
$menu        = hyprlauncher


#################
### AUTOSTART  ###
#################

# Initialize the swww wallpaper daemon before setting the wallpaper.
# The wallpaper path is read from device.conf by start-eww.sh.
exec-once = swww-daemon

# Start the eww bar. The script detects screen orientation and monitor count,
# then opens the appropriate bar window(s) on each monitor.
exec-once = ~/.config/eww/config/eww-launcher.sh


#############################
### ENVIRONMENT VARIABLES ###
#############################

# Reference: https://wiki.hypr.land/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = WLR_NO_HARDWARE_CURSORS,1
env = WLR_RENDERER_ALLOW_SOFTWARE,1


#####################
### LOOK AND FEEL ###
#####################

# Reference: https://wiki.hypr.land/Configuring/Variables/
general {
    gaps_in  = 5

    # gaps_out top value reserves space for the horizontal eww bar (46px bar + 6px margin + 10px gap).
    # The left value reserves space for the vertical eww bar when in portrait orientation.
    # Format: top, right, bottom, left.
    gaps_out = 62, 10, 10, 10

    border_size = 2

    # Primer accent colors for active and inactive window borders.
    col.active_border   = rgba(388bfdff)
    col.inactive_border = rgba(30363dff)

    resize_on_border = false
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 10
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 8
        render_power = 3
        color        = rgba(0d111799)
    }

    blur {
        enabled    = true
        size       = 6
        passes     = 3
        vibrancy   = 0.1696
        popups     = true
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 1.94, almostLinear, fade
    animation = workspacesIn,  1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = zoomFactor,    1, 7,    quick
}

dwindle {
    # Pseudotile enables floating-like tiling. Bound to mainMod + P.
    pseudotile    = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    # Disable the default Hyprland anime mascot wallpaper.
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}


#####################
### LAYER RULES   ###
#####################

# Apply blur and transparency to the eww bar layer so the swww animated
# wallpaper is visible through the bar background.
# Reference: https://wiki.hypr.land/Configuring/Layer-Rules/






##############################
### WINDOW RULES           ###
##############################

# Reference: https://wiki.hypr.land/Configuring/Window-Rules/

windowrule {
    # Suppress maximize requests from all applications.
    name  = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    # Fix dragging issues with XWayland floating windows.
    name  = fix-xwayland-drags
    match:class      = ^$
    match:title      = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false
    no_focus = true
}

windowrule {
    # Position the hyprland-run launcher near the bottom of the screen.
    name  = move-hyprland-run
    match:class = hyprland-run
    move  = 20 monitor_h-120
    float = yes
}

windowrule {
    # Float and position eww stub popup windows.
    # Actual position is handled by defwindow geometry in eww.yuck.
    name  = eww-popup
    match:class = eww-popup
    float = yes
}


#############
### INPUT ###
#############

# Reference: https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout  = us
    kb_variant =
    kb_model   =
    kb_options =
    kb_rules   =

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = false
    }
}

# Three-finger horizontal swipe to switch workspaces.
gesture = 3, horizontal, workspace


###################
### KEYBINDINGS ###
###################

# Reference: https://wiki.hypr.land/Configuring/Binds/
$mainMod = SUPER

# Application launchers.
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu

# Window management.
bind = $mainMod,       C, killactive,
bind = $mainMod,       V, togglefloating,
bind = $mainMod,       P, pseudo,
bind = $mainMod,       J, layoutmsg, togglesplit
bind = $mainMod,       M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Lock screen using hyprlock.
bind = $mainMod, L, exec, hyprlock

# Focus movement with arrow keys.
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Switch workspaces with mainMod + [1-0].
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [1-0].
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special scratchpad workspace.
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace,        special:magic

# Scroll through workspaces with mainMod + mouse scroll.
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move and resize windows with mainMod + mouse buttons.
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia keys for volume control.
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness control keys (laptop only).
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media playback control via playerctl.
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

# Layer rules for eww bar — new block syntax (Hyprland 0.53+).
# Applies blur and transparency to the eww layer surface.
layerrule {
    name = eww-blur
    match:namespace = ^eww$
    blur = on
    ignore_alpha = 0.1
}
exec-once = fcitx5 -d
